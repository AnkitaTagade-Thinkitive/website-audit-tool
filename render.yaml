# Render Blueprint — https://render.com/docs/blueprint-spec
#
# This service is now built from the repo's Dockerfile, not the native Node
# runtime. The Dockerfile installs system Chromium via apt — that binary is
# baked into the image and cannot be corrupted by a half-finished Puppeteer
# download in the persistent workspace volume.
services:
  - type: web
    name: seolytics
    runtime: docker
    plan: free                # Switch to "starter" ($7/mo) for always-on (no cold starts).
    region: oregon
    branch: main
    healthCheckPath: /healthz
    # No buildCommand / startCommand — the Dockerfile owns both.
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false
