# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting your GitHub repo on Render, click "New Blueprint Instance" and
# point it at this file. Render will create the service with these settings.
services:
  - type: web
    name: website-audit-tool
    runtime: node
    plan: free                # Switch to "starter" ($7/mo) for always-on (no cold starts).
    region: oregon            # Pick the region closest to you / your users.
    branch: main
    healthCheckPath: /healthz
    # Explicit Chromium install — do not rely on Puppeteer's implicit postinstall,
    # which can silently fail on Render or skip if NPM_CONFIG_IGNORE_SCRIPTS is set.
    # The download honours .puppeteerrc.cjs and writes to <project>/.cache/puppeteer/.
    buildCommand: npm ci && npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false           # You set this in the Render dashboard. `sync: false` keeps the secret out of the blueprint.
      - key: PAGESPEED_API_KEY
        sync: false           # Same — optional but recommended for Core Web Vitals data.
